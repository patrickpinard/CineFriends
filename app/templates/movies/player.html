<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>{{ title }} — CineFriends</title>
    <style nonce="{{ csp_nonce() }}">
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        body { display: flex; flex-direction: column; position: relative; }

        /* ── Top bar ── */
        #player-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,.85) 0%, transparent 100%);
            opacity: 1;
            transition: opacity .3s ease;
        }
        #player-bar.hidden-bar { opacity: 0; pointer-events: none; }

        #btn-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,.25);
            background: rgba(255,255,255,.12);
            color: #fff;
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .1s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #btn-close:hover { background: rgba(255,255,255,.28); border-color: rgba(255,255,255,.5); }
        #btn-close:active { transform: scale(.92); }

        #player-title {
            flex: 1;
            min-width: 0;
            font-size: .875rem;
            font-weight: 600;
            color: rgba(255,255,255,.92);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #player-badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 99px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .08em;
            color: rgba(255,255,255,.6);
            text-transform: uppercase;
        }

        /* ── Video ── */
        #video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 1;
        }

        /* ── Overlay centré (chargement / erreur) ── */
        #overlay {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 15;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: rgba(0,0,0,.82);
            text-align: center;
            padding: 32px;
        }
        #overlay.visible { display: flex; }

        #overlay-icon { font-size: 2.5rem; }
        #overlay-title { font-size: 1rem; font-weight: 700; color: #fff; }
        #overlay-msg   { font-size: .85rem; color: rgba(255,255,255,.6); max-width: 340px; line-height: 1.6; }

        /* download button in error overlay */
        #btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            padding: 10px 20px;
            border-radius: 99px;
            background: #5eead4;
            color: #0f172a;
            font-size: .8rem;
            font-weight: 700;
            text-decoration: none;
            transition: background .15s, transform .1s;
        }
        #btn-download:hover { background: #99f6e4; }
        #btn-download:active { transform: scale(.95); }

        /* spinner */
        .spin {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,.15);
            border-top-color: rgba(255,255,255,.8);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* progress bar */
        #progress-bar-wrap {
            width: 220px; height: 4px;
            background: rgba(255,255,255,.15);
            border-radius: 99px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #5eead4;
            border-radius: 99px;
            transition: width .5s ease;
        }
    </style>
</head>
<body>

    <!-- Top bar -->
    <div id="player-bar">
        <button id="btn-close" title="Fermer" aria-label="Fermer">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
        <span id="player-title">{{ title }}</span>
        <span id="player-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z" clip-rule="evenodd"/>
            </svg>
            CineFriends
        </span>
    </div>

    <!-- Video -->
    <video id="video"
           controls
           preload="metadata"
           playsinline
           controlslist="nodownload">
    </video>

    <!-- Overlay chargement / erreur -->
    <div id="overlay">
        <div id="overlay-icon"></div>
        <div id="overlay-title"></div>
        <div id="overlay-msg"></div>
        <div id="progress-bar-wrap" style="display:none">
            <div id="progress-bar"></div>
        </div>
        <a id="btn-download" href="{{ download_url }}" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Télécharger le fichier
        </a>
    </div>

    <script nonce="{{ csp_nonce() }}">
    (function () {
        'use strict';

        var STREAM_URL   = {{ stream_url | tojson }};
        var DOWNLOAD_URL = {{ download_url | tojson }};
        var EXT          = {{ ext | tojson }};

        var bar     = document.getElementById('player-bar');
        var video   = document.getElementById('video');
        var overlay = document.getElementById('overlay');
        var oIcon   = document.getElementById('overlay-icon');
        var oTitle  = document.getElementById('overlay-title');
        var oMsg    = document.getElementById('overlay-msg');
        var pWrap   = document.getElementById('progress-bar-wrap');
        var btnDl   = document.getElementById('btn-download');
        var hideTimer;

        // ── Close ──────────────────────────────────────────────────────────
        document.getElementById('btn-close').addEventListener('click', function () { window.close(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') window.close(); });

        // ── Auto-hide bar ──────────────────────────────────────────────────
        function resetHide() {
            bar.classList.remove('hidden-bar');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(function () {
                if (!video.paused) bar.classList.add('hidden-bar');
            }, 3000);
        }
        document.addEventListener('mousemove', resetHide);
        document.addEventListener('touchstart', resetHide);
        video.addEventListener('play', resetHide);
        video.addEventListener('pause', function () { bar.classList.remove('hidden-bar'); clearTimeout(hideTimer); });

        // ── Overlay helpers ────────────────────────────────────────────────
        function showError(title, msg, showDownload) {
            oIcon.textContent  = '⚠️';
            oTitle.textContent = title;
            oMsg.innerHTML     = msg;
            pWrap.style.display = 'none';
            btnDl.style.display = showDownload ? 'inline-flex' : 'none';
            overlay.classList.add('visible');
        }
        function hideOverlay() { overlay.classList.remove('visible'); }

        // ── Load & play ────────────────────────────────────────────────────
        video.src = STREAM_URL;
        video.load();
        video.play().catch(function () {});

        video.addEventListener('playing', hideOverlay);

        video.addEventListener('error', function () {
            var unsupported = ['mkv', 'avi', 'wmv', 'flv', 'mov'].indexOf(EXT) !== -1;
            if (unsupported) {
                showError(
                    'Format non supporté par ce navigateur',
                    'Le format <strong>.' + EXT.toUpperCase() + '</strong> ne peut pas être lu directement dans votre navigateur.<br>' +
                    'Téléchargez le fichier et ouvrez-le avec VLC ou un lecteur compatible.',
                    true
                );
            } else {
                showError('Lecture impossible',
                    'Ce fichier ne peut pas être lu dans votre navigateur.<br>Le codec vidéo n\'est peut-être pas compatible.',
                    true);
            }
        });

    }());
    </script>
</body>
</html>

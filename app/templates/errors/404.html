{% extends 'base.html' %}

{% block header_title %}Erreur 404{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
    <h1 class="text-6xl font-bold text-rose-500">404</h1>
    <p class="mt-4 text-sm text-slate-600">La page que vous cherchez n’existe pas ou n’est plus disponible.</p>
    <a href="{{ url_for('main.dashboard') }}" class="mt-6 inline-flex items-center justify-center rounded-lg bg-teal-500 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-400">Retour au dashboard</a>
</div>
{% endblock %}
